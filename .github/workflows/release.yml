name: Release

# Run manually from the Actions tab. Builds a universal, ad-hoc-signed Honey.app,
# zips it, and publishes a downloadable GitHub Release at the given tag (vMAJOR.MINOR).
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v1.1) — follows the vMAJOR.MINOR scheme"
        required: true
        type: string

permissions:
  contents: write   # needed to create the tag + release

jobs:
  release:
    runs-on: macos-latest
    env:
      VERSION: ${{ inputs.version }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate version
        run: |
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "::error::Version '$VERSION' must look like v1.0 or v1.0.1"; exit 1
          fi
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "::error::Release $VERSION already exists — delete it or pick a new version."; exit 1
          fi

      - name: Stamp bundle version
        run: |
          NUM="${VERSION#v}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $NUM" Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $NUM" Info.plist

      - name: Build universal app + zip
        run: ./package.sh

      - name: Create release
        run: |
          gh release create "$VERSION" dist/Honey-macOS.zip \
            --title "Honey & Bagel ${VERSION#v}" \
            --notes ""
